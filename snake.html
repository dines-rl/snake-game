<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake Game</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    color: #eee;
  }
  h1 { margin-bottom: 8px; font-size: 28px; letter-spacing: 2px; }
  #score { font-size: 18px; margin-bottom: 12px; color: #0f0; }
  canvas {
    border: 2px solid #0f0;
    border-radius: 4px;
    background: #16213e;
  }
  #message {
    margin-top: 12px;
    font-size: 16px;
    height: 24px;
    color: #aaa;
  }
  #controls {
    margin-top: 16px;
    display: grid;
    grid-template-areas:
      ". up ."
      "left down right";
    gap: 6px;
  }
  #controls button {
    width: 50px; height: 50px;
    font-size: 22px;
    border: none; border-radius: 8px;
    background: #0a3d62;
    color: #eee;
    cursor: pointer;
    touch-action: manipulation;
  }
  #controls button:active { background: #3c6382; }
  .up    { grid-area: up; }
  .down  { grid-area: down; }
  .left  { grid-area: left; }
  .right { grid-area: right; }
</style>
</head>
<body>
<h1>SNAKE</h1>
<div id="score">Score: 0</div>
<canvas id="game" width="400" height="400"></canvas>
<div id="message">Press any arrow key or tap a button to start</div>
<div id="controls">
  <button class="up" onclick="setDir(0,-1)">&#9650;</button>
  <button class="left" onclick="setDir(-1,0)">&#9664;</button>
  <button class="down" onclick="setDir(0,1)">&#9660;</button>
  <button class="right" onclick="setDir(1,0)">&#9654;</button>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const msgEl = document.getElementById('message');

const CELL = 20;
const COLS = canvas.width / CELL;
const ROWS = canvas.height / CELL;
const TICK_MS = 120;

let snake, dir, nextDir, food, score, running, gameOver, loopId;

function init() {
  const mid = Math.floor(ROWS / 2);
  snake = [
    { x: 5, y: mid },
    { x: 4, y: mid },
    { x: 3, y: mid }
  ];
  dir = { x: 1, y: 0 };
  nextDir = { x: 1, y: 0 };
  score = 0;
  running = false;
  gameOver = false;
  scoreEl.textContent = 'Score: 0';
  msgEl.textContent = 'Press any arrow key or tap a button to start';
  placeFood();
  draw();
}

function placeFood() {
  let pos;
  do {
    pos = {
      x: Math.floor(Math.random() * COLS),
      y: Math.floor(Math.random() * ROWS)
    };
  } while (snake.some(s => s.x === pos.x && s.y === pos.y));
  food = pos;
}

function draw() {
  ctx.fillStyle = '#16213e';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Draw grid lines (subtle)
  ctx.strokeStyle = 'rgba(255,255,255,0.03)';
  for (let x = 0; x < COLS; x++) {
    for (let y = 0; y < ROWS; y++) {
      ctx.strokeRect(x * CELL, y * CELL, CELL, CELL);
    }
  }

  // Draw food
  ctx.fillStyle = '#e74c3c';
  ctx.beginPath();
  ctx.arc(food.x * CELL + CELL / 2, food.y * CELL + CELL / 2, CELL / 2 - 2, 0, Math.PI * 2);
  ctx.fill();

  // Draw snake
  snake.forEach((seg, i) => {
    const brightness = Math.max(80, 255 - i * 8);
    ctx.fillStyle = i === 0
      ? '#0f0'
      : `rgb(0, ${brightness}, 0)`;
    ctx.fillRect(seg.x * CELL + 1, seg.y * CELL + 1, CELL - 2, CELL - 2);
    ctx.strokeStyle = '#16213e';
    ctx.strokeRect(seg.x * CELL + 1, seg.y * CELL + 1, CELL - 2, CELL - 2);
  });

  if (gameOver) {
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#e74c3c';
    ctx.font = 'bold 40px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('GAME OVER', canvas.width / 2, canvas.height / 2 - 10);
    ctx.fillStyle = '#eee';
    ctx.font = '20px sans-serif';
    ctx.fillText(`Score: ${score}`, canvas.width / 2, canvas.height / 2 + 25);
  }
}

function tick() {
  dir = { ...nextDir };

  const head = {
    x: snake[0].x + dir.x,
    y: snake[0].y + dir.y
  };

  // Wall collision
  if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) {
    return endGame();
  }

  // Self collision
  if (snake.some(s => s.x === head.x && s.y === head.y)) {
    return endGame();
  }

  snake.unshift(head);

  if (head.x === food.x && head.y === food.y) {
    score += 10;
    scoreEl.textContent = `Score: ${score}`;
    placeFood();
  } else {
    snake.pop();
  }

  draw();
}

function endGame() {
  gameOver = true;
  running = false;
  clearInterval(loopId);
  msgEl.textContent = 'Game over! Press any arrow key to restart';
  draw();
}

function setDir(x, y) {
  // Prevent reversing into yourself
  if (dir.x === -x && dir.y === -y) return;
  nextDir = { x, y };
  startIfNeeded();
}

function startIfNeeded() {
  if (gameOver) {
    init();
  }
  if (!running) {
    running = true;
    msgEl.textContent = '';
    loopId = setInterval(tick, TICK_MS);
  }
}

document.addEventListener('keydown', e => {
  switch (e.key) {
    case 'ArrowUp':    e.preventDefault(); setDir(0, -1); break;
    case 'ArrowDown':  e.preventDefault(); setDir(0, 1);  break;
    case 'ArrowLeft':  e.preventDefault(); setDir(-1, 0); break;
    case 'ArrowRight': e.preventDefault(); setDir(1, 0);  break;
  }
});

init();
</script>
</body>
</html>
