<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake - Multiplayer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Segoe UI', system-ui, sans-serif;
    color: #eee;
  }

  .container { text-align: center; }

  h1 {
    font-size: 2rem;
    margin-bottom: 0.5rem;
    color: #0f0;
    text-shadow: 0 0 10px rgba(0, 255, 0, 0.3);
  }

  .score-bar {
    display: flex;
    justify-content: center;
    gap: 2rem;
    max-width: 400px;
    margin: 0 auto 0.5rem;
    font-size: 1.1rem;
  }

  .score-bar .p0 { color: #00ff88; }
  .score-bar .p1 { color: #3399ff; }

  canvas {
    border: 2px solid #0f0;
    border-radius: 4px;
    display: block;
    margin: 0 auto;
    background: #0d0d1a;
  }

  .canvas-wrap {
    position: relative;
    display: inline-block;
  }

  .overlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 0.75rem;
    background: rgba(13, 13, 26, 0.85);
    pointer-events: auto;
  }

  .overlay.hidden { display: none; }

  .overlay p { font-size: 1.2rem; }

  .overlay .big {
    font-size: 2.5rem;
    font-weight: bold;
    color: #0f0;
  }

  .overlay .countdown {
    font-size: 4rem;
    font-weight: bold;
    color: #ff2255;
    text-shadow: 0 0 20px rgba(255, 34, 85, 0.5);
  }

  .overlay input {
    background: #222;
    border: 1px solid #555;
    color: #eee;
    padding: 0.4rem 0.8rem;
    font-size: 1rem;
    border-radius: 4px;
    text-align: center;
    width: 180px;
    outline: none;
  }

  .overlay input:focus { border-color: #0f0; }

  .overlay button {
    background: #0f0;
    color: #1a1a2e;
    border: none;
    padding: 0.5rem 1.5rem;
    font-size: 1rem;
    font-weight: bold;
    border-radius: 4px;
    cursor: pointer;
  }

  .overlay button:hover { background: #0c0; }

  .status-bar {
    margin-top: 0.5rem;
    font-size: 0.85rem;
    color: #888;
  }

  .status-bar .connected { color: #0f0; }
  .status-bar .disconnected { color: #f44; }

  .instructions {
    margin-top: 0.25rem;
    font-size: 0.85rem;
    color: #666;
  }
</style>
</head>
<body>
<div class="container">
  <h1>Snake</h1>
  <div class="score-bar">
    <span class="p0" id="score0"></span>
    <span class="p1" id="score1"></span>
  </div>
  <div class="canvas-wrap">
    <canvas id="game" width="400" height="400"></canvas>
    <div class="overlay" id="overlay">
      <p class="big" id="overlayTitle">Multiplayer Snake</p>
      <p id="overlayMsg">Enter your name to join</p>
      <input id="nameInput" type="text" placeholder="Your name" maxlength="16" />
      <button id="joinBtn">Join Game</button>
    </div>
  </div>
  <p class="status-bar">
    <span id="connStatus" class="disconnected">Connecting...</span>
  </p>
  <p class="instructions">Arrow keys or WASD to move</p>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const score0El = document.getElementById('score0');
const score1El = document.getElementById('score1');
const overlay = document.getElementById('overlay');
const overlayTitle = document.getElementById('overlayTitle');
const overlayMsg = document.getElementById('overlayMsg');
const nameInput = document.getElementById('nameInput');
const joinBtn = document.getElementById('joinBtn');
const connStatus = document.getElementById('connStatus');

const GRID = 20;
const COLS = canvas.width / GRID;
const ROWS = canvas.height / GRID;

const PLAYER_COLORS = [
  { head: '#00ff88', glow: '#00ff88', body: (i, len) => { const r = 1 - i / len; return `rgb(0, ${Math.floor(180 + 75 * r)}, ${Math.floor(80 + 50 * r)})`; } },
  { head: '#3399ff', glow: '#3399ff', body: (i, len) => { const r = 1 - i / len; return `rgb(${Math.floor(30 + 20 * r)}, ${Math.floor(120 + 50 * r)}, ${Math.floor(200 + 55 * r)})`; } },
];

let ws = null;
let myId = null;
let state = null;      // latest server state
let joined = false;
let currentScreen = 'join'; // 'join' | 'lobby' | 'countdown' | 'game' | 'gameover'

// --- WebSocket connection ---

function connect() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${proto}://${location.host}`);

  ws.addEventListener('open', () => {
    connStatus.textContent = 'Connected';
    connStatus.className = 'connected';
    if (joined) {
      // Reconnecting — re-show join
      showJoinScreen();
    }
  });

  ws.addEventListener('close', () => {
    connStatus.textContent = 'Disconnected — reconnecting...';
    connStatus.className = 'disconnected';
    myId = null;
    joined = false;
    setTimeout(connect, 2000);
  });

  ws.addEventListener('message', (e) => {
    const msg = JSON.parse(e.data);
    handleMessage(msg);
  });
}

function send(msg) {
  if (ws && ws.readyState === 1) {
    ws.send(JSON.stringify(msg));
  }
}

// --- Message handling ---

function handleMessage(msg) {
  switch (msg.type) {
    case 'welcome':
      myId = msg.id;
      break;

    case 'lobby':
      showLobbyScreen(msg);
      break;

    case 'countdown':
      showCountdown(msg.seconds);
      break;

    case 'state':
      state = msg;
      if (currentScreen !== 'game') {
        currentScreen = 'game';
        hideOverlay();
      }
      updateScoreBar();
      draw();
      break;

    case 'gameover':
      showGameOver(msg);
      break;

    case 'playerLeft':
      showOverlayScreen('Player Left', `${msg.name} disconnected. Waiting for players...`);
      currentScreen = 'lobby';
      break;

    case 'full':
      showOverlayScreen('Game Full', msg.message);
      break;
  }
}

// --- UI screens ---

function showJoinScreen() {
  currentScreen = 'join';
  overlayTitle.textContent = 'Multiplayer Snake';
  overlayMsg.textContent = 'Enter your name to join';
  nameInput.style.display = '';
  joinBtn.style.display = '';
  joinBtn.textContent = 'Join Game';
  joinBtn.onclick = doJoin;
  overlay.classList.remove('hidden');
}

function doJoin() {
  const name = nameInput.value.trim() || `Player ${(myId || 0) + 1}`;
  send({ type: 'setName', name });
  joined = true;
  nameInput.style.display = 'none';
  joinBtn.style.display = 'none';
}

function showLobbyScreen(msg) {
  currentScreen = 'lobby';
  const names = msg.players.map(p => p.name).join(', ');
  overlayTitle.textContent = 'Waiting for Players';
  overlayMsg.textContent = `${msg.players.length}/${msg.needed} — ${names}`;
  nameInput.style.display = 'none';
  joinBtn.style.display = 'none';
  overlay.classList.remove('hidden');
}

function showCountdown(seconds) {
  currentScreen = 'countdown';
  overlayTitle.textContent = '';
  overlayMsg.innerHTML = `<span class="countdown">${seconds}</span>`;
  nameInput.style.display = 'none';
  joinBtn.style.display = 'none';
  overlay.classList.remove('hidden');
}

function showGameOver(msg) {
  currentScreen = 'gameover';
  const scores = msg.players.map(p => `${p.name}: ${p.score}`).join('  |  ');
  if (msg.winner) {
    overlayTitle.textContent = `${msg.winner} Wins!`;
  } else {
    overlayTitle.textContent = 'Draw!';
  }
  overlayMsg.textContent = scores;
  nameInput.style.display = 'none';
  joinBtn.style.display = '';
  joinBtn.textContent = 'Play Again';
  joinBtn.onclick = () => send({ type: 'restart' });
  overlay.classList.remove('hidden');
}

function showOverlayScreen(title, msg) {
  overlayTitle.textContent = title;
  overlayMsg.textContent = msg;
  nameInput.style.display = 'none';
  joinBtn.style.display = 'none';
  overlay.classList.remove('hidden');
}

function hideOverlay() {
  overlay.classList.add('hidden');
}

function updateScoreBar() {
  if (!state) return;
  const p = state.players;
  score0El.textContent = p[0] ? `${p[0].name}: ${p[0].score}` : '';
  score1El.textContent = p[1] ? `${p[1].name}: ${p[1].score}` : '';
}

// --- Drawing ---

function draw() {
  if (!state) return;

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Grid
  ctx.strokeStyle = 'rgba(255,255,255,0.03)';
  ctx.lineWidth = 0.5;
  for (let x = 0; x <= COLS; x++) {
    ctx.beginPath();
    ctx.moveTo(x * GRID, 0);
    ctx.lineTo(x * GRID, canvas.height);
    ctx.stroke();
  }
  for (let y = 0; y <= ROWS; y++) {
    ctx.beginPath();
    ctx.moveTo(0, y * GRID);
    ctx.lineTo(canvas.width, y * GRID);
    ctx.stroke();
  }

  // Food
  if (state.food) {
    ctx.fillStyle = '#ff2255';
    ctx.shadowColor = '#ff2255';
    ctx.shadowBlur = 8;
    ctx.beginPath();
    ctx.arc(
      state.food.x * GRID + GRID / 2,
      state.food.y * GRID + GRID / 2,
      GRID / 2 - 2, 0, Math.PI * 2
    );
    ctx.fill();
    ctx.shadowBlur = 0;
  }

  // Snakes
  for (const p of state.players) {
    const colors = PLAYER_COLORS[p.id % PLAYER_COLORS.length];
    const alpha = p.alive ? 1 : 0.3;
    ctx.globalAlpha = alpha;

    p.snake.forEach((seg, i) => {
      ctx.fillStyle = i === 0 ? colors.head : colors.body(i, p.snake.length);
      ctx.shadowColor = colors.glow;
      ctx.shadowBlur = i === 0 ? 6 : 2;
      const pad = i === 0 ? 1 : 2;
      ctx.fillRect(
        seg.x * GRID + pad,
        seg.y * GRID + pad,
        GRID - pad * 2,
        GRID - pad * 2
      );
    });

    ctx.globalAlpha = 1;
  }
  ctx.shadowBlur = 0;
}

// --- Input ---

document.addEventListener('keydown', (e) => {
  let dir = null;
  switch (e.key) {
    case 'ArrowUp':    case 'w': case 'W': dir = { x: 0, y: -1 }; break;
    case 'ArrowDown':  case 's': case 'S': dir = { x: 0, y: 1 };  break;
    case 'ArrowLeft':  case 'a': case 'A': dir = { x: -1, y: 0 }; break;
    case 'ArrowRight': case 'd': case 'D': dir = { x: 1, y: 0 };  break;
  }
  if (dir) {
    e.preventDefault();
    send({ type: 'direction', dir });
  }
});

// Touch controls
let touchStartX = 0, touchStartY = 0;
canvas.addEventListener('touchstart', (e) => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
});

canvas.addEventListener('touchmove', (e) => { e.preventDefault(); }, { passive: false });

canvas.addEventListener('touchend', (e) => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  if (Math.abs(dx) < 10 && Math.abs(dy) < 10) return;
  if (Math.abs(dx) > Math.abs(dy)) {
    send({ type: 'direction', dir: { x: dx > 0 ? 1 : -1, y: 0 } });
  } else {
    send({ type: 'direction', dir: { x: 0, y: dy > 0 ? 1 : -1 } });
  }
});

// Enter key joins or restarts
nameInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') joinBtn.click();
});

// --- Init ---
connect();
</script>
</body>
</html>
