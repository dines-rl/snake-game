<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake Game</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Segoe UI', system-ui, sans-serif;
    color: #eee;
  }

  .container {
    text-align: center;
  }

  h1 {
    font-size: 2rem;
    margin-bottom: 0.5rem;
    color: #0f0;
    text-shadow: 0 0 10px rgba(0, 255, 0, 0.3);
  }

  .score-bar {
    display: flex;
    justify-content: space-between;
    max-width: 400px;
    margin: 0 auto 0.5rem;
    font-size: 1.1rem;
  }

  canvas {
    border: 2px solid #0f0;
    border-radius: 4px;
    display: block;
    margin: 0 auto;
    background: #0d0d1a;
  }

  .overlay {
    position: absolute;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 1rem;
    pointer-events: none;
  }

  .overlay.hidden { display: none; }

  .overlay p {
    font-size: 1.5rem;
  }

  .overlay .big {
    font-size: 2.5rem;
    font-weight: bold;
    color: #0f0;
  }

  .instructions {
    margin-top: 0.75rem;
    font-size: 0.85rem;
    color: #888;
  }
</style>
</head>
<body>
<div class="container">
  <h1>Snake</h1>
  <div class="score-bar">
    <span>Score: <strong id="score">0</strong></span>
    <span>Best: <strong id="highScore">0</strong></span>
  </div>
  <div style="position:relative;display:inline-block;">
    <canvas id="game" width="400" height="400"></canvas>
    <div class="overlay" id="overlay">
      <p class="big" id="overlayTitle">Snake</p>
      <p id="overlayMsg">Press any key or tap to start</p>
    </div>
  </div>
  <p class="instructions">Arrow keys / WASD to move &middot; P to pause</p>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const highScoreEl = document.getElementById('highScore');
const overlay = document.getElementById('overlay');
const overlayTitle = document.getElementById('overlayTitle');
const overlayMsg = document.getElementById('overlayMsg');

const GRID = 20;
const COLS = canvas.width / GRID;
const ROWS = canvas.height / GRID;
const TICK_MS = 110;

let snake, direction, nextDirection, food, score, highScore, gameState, loopId;

// gameState: 'idle' | 'running' | 'paused' | 'dead'

highScore = parseInt(localStorage.getItem('snakeHighScore') || '0', 10);
highScoreEl.textContent = highScore;

function init() {
  const midX = Math.floor(COLS / 2);
  const midY = Math.floor(ROWS / 2);
  snake = [
    { x: midX, y: midY },
    { x: midX - 1, y: midY },
    { x: midX - 2, y: midY },
  ];
  direction = { x: 1, y: 0 };
  nextDirection = { x: 1, y: 0 };
  score = 0;
  scoreEl.textContent = score;
  placeFood();
}

function placeFood() {
  let pos;
  do {
    pos = {
      x: Math.floor(Math.random() * COLS),
      y: Math.floor(Math.random() * ROWS),
    };
  } while (snake.some(s => s.x === pos.x && s.y === pos.y));
  food = pos;
}

function update() {
  direction = { ...nextDirection };
  const head = {
    x: snake[0].x + direction.x,
    y: snake[0].y + direction.y,
  };

  // Wall collision
  if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) {
    return die();
  }

  // Self collision
  if (snake.some(s => s.x === head.x && s.y === head.y)) {
    return die();
  }

  snake.unshift(head);

  if (head.x === food.x && head.y === food.y) {
    score++;
    scoreEl.textContent = score;
    if (score > highScore) {
      highScore = score;
      highScoreEl.textContent = highScore;
      localStorage.setItem('snakeHighScore', String(highScore));
    }
    placeFood();
  } else {
    snake.pop();
  }
}

function die() {
  gameState = 'dead';
  clearInterval(loopId);
  showOverlay('Game Over', `Score: ${score} — Press any key to restart`);
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Draw grid lines (subtle)
  ctx.strokeStyle = 'rgba(255,255,255,0.03)';
  ctx.lineWidth = 0.5;
  for (let x = 0; x <= COLS; x++) {
    ctx.beginPath();
    ctx.moveTo(x * GRID, 0);
    ctx.lineTo(x * GRID, canvas.height);
    ctx.stroke();
  }
  for (let y = 0; y <= ROWS; y++) {
    ctx.beginPath();
    ctx.moveTo(0, y * GRID);
    ctx.lineTo(canvas.width, y * GRID);
    ctx.stroke();
  }

  // Draw food
  ctx.fillStyle = '#ff2255';
  ctx.shadowColor = '#ff2255';
  ctx.shadowBlur = 8;
  ctx.beginPath();
  ctx.arc(
    food.x * GRID + GRID / 2,
    food.y * GRID + GRID / 2,
    GRID / 2 - 2,
    0,
    Math.PI * 2
  );
  ctx.fill();
  ctx.shadowBlur = 0;

  // Draw snake
  snake.forEach((seg, i) => {
    const ratio = 1 - i / snake.length;
    const g = Math.floor(180 + 75 * ratio);
    ctx.fillStyle = `rgb(0, ${g}, 0)`;
    ctx.shadowColor = '#0f0';
    ctx.shadowBlur = i === 0 ? 6 : 2;
    const pad = i === 0 ? 1 : 2;
    ctx.fillRect(
      seg.x * GRID + pad,
      seg.y * GRID + pad,
      GRID - pad * 2,
      GRID - pad * 2
    );
  });
  ctx.shadowBlur = 0;
}

function tick() {
  update();
  if (gameState === 'running') draw();
}

function startGame() {
  init();
  hideOverlay();
  gameState = 'running';
  draw();
  loopId = setInterval(tick, TICK_MS);
}

function showOverlay(title, msg) {
  overlayTitle.textContent = title;
  overlayMsg.textContent = msg;
  overlay.classList.remove('hidden');
}

function hideOverlay() {
  overlay.classList.add('hidden');
}

function handleDirection(nx, ny) {
  // Prevent 180° reversal
  if (direction.x === -nx && direction.y === -ny) return;
  nextDirection = { x: nx, y: ny };
}

// Keyboard controls
document.addEventListener('keydown', e => {
  if (gameState === 'idle' || gameState === 'dead') {
    startGame();
    return;
  }

  if (e.key === 'p' || e.key === 'P') {
    if (gameState === 'running') {
      gameState = 'paused';
      clearInterval(loopId);
      showOverlay('Paused', 'Press P to resume');
    } else if (gameState === 'paused') {
      gameState = 'running';
      hideOverlay();
      loopId = setInterval(tick, TICK_MS);
    }
    return;
  }

  if (gameState === 'paused') {
    if (e.key === 'p' || e.key === 'P') {
      gameState = 'running';
      hideOverlay();
      loopId = setInterval(tick, TICK_MS);
    }
    return;
  }

  switch (e.key) {
    case 'ArrowUp':    case 'w': case 'W': handleDirection(0, -1); break;
    case 'ArrowDown':  case 's': case 'S': handleDirection(0, 1);  break;
    case 'ArrowLeft':  case 'a': case 'A': handleDirection(-1, 0); break;
    case 'ArrowRight': case 'd': case 'D': handleDirection(1, 0);  break;
  }
});

// Touch controls
let touchStartX = 0, touchStartY = 0;
canvas.addEventListener('touchstart', e => {
  if (gameState === 'idle' || gameState === 'dead') {
    startGame();
    return;
  }
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
});

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
}, { passive: false });

canvas.addEventListener('touchend', e => {
  if (gameState !== 'running') return;
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  if (Math.abs(dx) < 10 && Math.abs(dy) < 10) return;
  if (Math.abs(dx) > Math.abs(dy)) {
    handleDirection(dx > 0 ? 1 : -1, 0);
  } else {
    handleDirection(0, dy > 0 ? 1 : -1);
  }
});

// Initial state
gameState = 'idle';
init();
draw();
showOverlay('Snake', 'Press any key or tap to start');
</script>
</body>
</html>
